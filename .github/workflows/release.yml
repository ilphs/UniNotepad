name: release

# Build native binaries for macOS (arm64 + x86_64), Windows (x86_64), and
# Linux (x86_64) on their respective runners, and attach them to the GitHub
# release for the pushed tag. Triggered by pushing a v* tag.
#
# Can also be run manually (workflow_dispatch) to get installable test builds
# without publishing anything: with no tag in the ref, tagName is left empty so
# tauri-action skips release creation, and the bundles are uploaded as workflow
# artifacts instead. Use this to verify a platform-specific fix before cutting
# a real release.
on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest # macOS Apple Silicon (arm64)
            args: '--target aarch64-apple-darwin'
            rust-target: aarch64-apple-darwin
          - platform: macos-latest # macOS Intel (x86_64)
            args: '--target x86_64-apple-darwin'
            rust-target: x86_64-apple-darwin
          - platform: ubuntu-22.04 # Linux (x86_64): .deb / .AppImage
            args: ''
            rust-target: ''
          - platform: windows-latest # Windows (x86_64): .msi / NSIS .exe
            args: ''
            rust-target: ''
    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust-target }}

      - name: Install Linux build dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            librsvg2-dev \
            libayatana-appindicator3-dev \
            patchelf \
            build-essential

      - name: Install frontend dependencies
        run: npm ci

      # An empty tagName makes tauri-action build only — no release is created
      # or uploaded to. That is the manual-run path.
      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Updater signing. With these set, tauri-action signs each bundle and
          # emits the .sig files + latest.json, uploading them to the release so
          # tauri-plugin-updater can verify and apply updates. Register both as
          # repo secrets; the password is empty for this keypair.
          # The .sig uploads are stripped afterwards — see strip-sig-assets.
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: ${{ startsWith(github.ref, 'refs/tags/') && github.ref_name || '' }}
          releaseName: ${{ github.ref_name }}
          releaseBody: |
            See the attached assets for macOS (arm64/x86_64), Windows, and Linux downloads.

            > **macOS 안내** — 이 앱은 Apple 공증(notarization) 없이 배포되어, 내려받은 앱을
            > 처음 열면 "손상되었기 때문에 열 수 없습니다"라고 나올 수 있습니다. 파일이 실제로
            > 깨진 것이 아니라 공증되지 않은 앱에 대한 macOS 보안 기본 동작입니다.
            > 앱을 `응용 프로그램` 폴더로 옮긴 뒤 터미널에서 아래 한 줄을 실행하고 다시 여세요.
            >
            > ```
            > xattr -cr /Applications/UniNotepad.app
            > ```
          releaseDraft: false
          prerelease: false
          args: ${{ matrix.args }}

      # Manual runs produce no release, so keep the bundles as workflow
      # artifacts. Both globs are listed because a --target build nests the
      # bundle dir under the triple while a plain build does not.
      - uses: actions/upload-artifact@v4
        if: github.event_name == 'workflow_dispatch'
        with:
          name: bundle-${{ matrix.platform }}-${{ matrix.rust-target || 'default' }}
          if-no-files-found: error
          path: |
            src-tauri/target/release/bundle/**
            src-tauri/target/${{ matrix.rust-target }}/release/bundle/**

  # tauri-action drops a .sig next to every bundle, but nothing ever fetches
  # them: the updater reads each signature inline from latest.json, and humans
  # download the installer only. Strip them so the release page lists just the
  # files someone would actually click. Runs after every matrix job so the
  # last-writer merge of latest.json is already complete.
  strip-sig-assets:
    needs: build
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    steps:
      - name: Delete .sig assets from the release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ github.ref_name }}
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          # Guard: latest.json carries the signatures, so refuse to strip if it
          # is missing or any platform entry lost its inline signature.
          gh release download "$TAG" --repo "$REPO" --pattern latest.json --dir . --clobber
          python3 -c "
          import json, sys
          p = json.load(open('latest.json'))['platforms']
          bad = [k for k, v in p.items() if not v.get('signature')]
          if not p or bad:
              sys.exit(f'refusing to strip: missing signatures for {bad or \"(no platforms)\"}')
          print(f'latest.json verified: {len(p)} platform entries signed')
          "
          for asset in $(gh release view "$TAG" --repo "$REPO" \
              --json assets --jq '.assets[].name | select(endswith(".sig"))'); do
            echo "deleting $asset"
            gh release delete-asset "$TAG" "$asset" --repo "$REPO" --yes
          done
