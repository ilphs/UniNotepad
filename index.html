<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>UniNotepad</title>
  </head>
  <body>
    <div id="app">
      <div id="tabrow">
        <div id="tabbar"></div>
        <button id="tab-new" type="button" title="New Tab" aria-label="New Tab">+</button>
      </div>
      <div id="banner"></div>
      <div id="split">
        <div id="editor-host"></div>
        <div id="divider" hidden></div>
        <div id="preview-host" hidden></div>
      </div>
      <div id="statusbar"></div>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
